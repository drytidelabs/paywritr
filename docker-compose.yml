services:
  paywritr:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    # Put secrets in a local .env (not committed). See .env.example.
    env_file:
      - .env
    environment:
      - PORT=3000
      - BASE_URL=http://localhost:3000
      - SITE_TITLE=Paywritr
      - UNLOCK_DAYS=30
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # Payments provider switch: alby_hub (default) or lnbits
      - PAYMENTS_PROVIDER=${PAYMENTS_PROVIDER:-alby_hub}
      # LNbits provider
      - LNBITS_URL=${LNBITS_URL}
      - LNBITS_INVOICE_KEY=${LNBITS_INVOICE_KEY}
      - LNBITS_READ_KEY=${LNBITS_READ_KEY}
      # Alby Hub provider
      - ALBY_HUB_URL=${ALBY_HUB_URL}
    volumes:
      # Optional: edit posts without rebuilding the container.
      - ./content:/app/content:ro
